name: Docker Publish

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - '.github/workflows/docker-publish.yml'
      - 'src/SonnetDB/**'
      - 'src/SonnetDB/**'
      - 'web/admin/**'
      - 'docs/**'
      - '.config/dotnet-tools.json'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect Docker Hub credentials
        id: dockerhub
        shell: bash
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sonnetdb
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=SonnetDB Server
            org.opencontainers.image.description=SonnetDB with embedded Admin UI and Help Center
            org.opencontainers.image.vendor=maikebing / IoTSharp
            org.opencontainers.image.licenses=MIT

      - name: Extract Docker Hub metadata
        id: meta-dockerhub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: iotsharp/sonnetdb
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=SonnetDB Server
            org.opencontainers.image.description=SonnetDB with embedded Admin UI and Help Center
            org.opencontainers.image.vendor=maikebing / IoTSharp
            org.opencontainers.image.licenses=MIT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SonnetDB/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker Hub image
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SonnetDB/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report missing Docker Hub secrets
        if: steps.dockerhub.outputs.enabled != 'true'
        run: |
          echo "Docker Hub secrets are not configured. GHCR publish completed; Docker Hub publish was skipped."
