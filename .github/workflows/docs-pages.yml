name: Docs Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: actions/configure-pages@v5

      - name: Restore JekyllNet tool
        run: dotnet tool restore

      - name: Prepare GitHub Pages source
        shell: bash
        run: |
          set -euo pipefail

          source_dir="$RUNNER_TEMP/docs-pages-src"
          site_dir="$RUNNER_TEMP/docs-pages-site"
          repo_name="${GITHUB_REPOSITORY#*/}"

          rm -rf "$source_dir" "$site_dir"
          mkdir -p "$source_dir" "$site_dir"
          cp -R docs/. "$source_dir/"

          cat >> "$source_dir/_config.yml" <<EOF
          docs_baseurl: /$repo_name
          app_link_url: https://github.com/${GITHUB_REPOSITORY}
          app_link_text: 仓库
          home_primary_url: https://github.com/${GITHUB_REPOSITORY}
          home_primary_text: 查看仓库
          EOF

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool run jekyllnet build \
            --source "$RUNNER_TEMP/docs-pages-src" \
            --destination "$RUNNER_TEMP/docs-pages-site"
          touch "$RUNNER_TEMP/docs-pages-site/.nojekyll"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/docs-pages-site

  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
