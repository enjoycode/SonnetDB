name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore SonnetDB.slnx

      - name: Build
        run: dotnet build SonnetDB.slnx --configuration Release --no-restore /warnaserror

      - name: Test
        run: dotnet test SonnetDB.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SonnetDB.slnx

      - name: Format check
        run: dotnet format SonnetDB.slnx --verify-no-changes --no-restore --severity warn

  aot-publish:
    name: AOT Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish SonnetDB.Cli (Native AOT)
        run: dotnet publish src/SonnetDB.Cli/SonnetDB.Cli.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true /warnaserror

      - name: Publish SonnetDB (Native AOT)
        run: dotnet publish src/SonnetDB/SonnetDB.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true /warnaserror

      - name: Show AOT artifacts
        shell: bash
        run: |
          echo "==== SonnetDB.Cli ===="
          ls -lh src/SonnetDB.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/ || true
          echo "==== SonnetDB ===="
          ls -lh src/SonnetDB/bin/Release/net10.0/${{ matrix.rid }}/publish/ || true

      - name: Upload AOT artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aot-${{ matrix.rid }}
          path: |
            src/SonnetDB.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/
            src/SonnetDB/bin/Release/net10.0/${{ matrix.rid }}/publish/
