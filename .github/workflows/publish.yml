name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        default: '0.1.0'

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  nuget:
    name: NuGet Packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Pack NuGet packages
        shell: pwsh
        run: ./eng/release.ps1 -Tasks nuget -Version '${{ steps.version.outputs.version }}'

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/release/nuget/*

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v') && secrets.NUGET_API_KEY != ''
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          Get-ChildItem -LiteralPath artifacts/release/nuget -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key $env:NUGET_API_KEY `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }

  bundles:
    name: Release Bundles (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: nuget
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Linux AOT prerequisites
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Install nFPM
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: npm install --global @goreleaser/nfpm

      - name: Install WiX
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          dotnet tool install --tool-path ./.tools wix --version 5.0.2
          Add-Content -Path $env:GITHUB_PATH -Value (Resolve-Path ./.tools)

      - name: Build bundles and installers
        shell: pwsh
        run: ./eng/release.ps1 -Tasks bundles,installers -Version '${{ needs.nuget.outputs.version }}' -Rid '${{ matrix.rid }}' -BuildAdminUi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: |
            artifacts/release/bundles/${{ matrix.rid }}/*.zip
            artifacts/release/bundles/${{ matrix.rid }}/*.tar.gz
            artifacts/release/bundles/${{ matrix.rid }}/*.sha256
            artifacts/release/installers/${{ matrix.rid }}/*.msi
            artifacts/release/installers/${{ matrix.rid }}/*.deb
            artifacts/release/installers/${{ matrix.rid }}/*.rpm
            artifacts/release/installers/${{ matrix.rid }}/*.sha256

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - nuget
      - bundles
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: artifacts/release-upload

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="SonnetDB ${tag#v}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --notes-file docs/releases/README.md
          fi

          mapfile -t files < <(find artifacts/release-upload -type f \( \
            -name '*.nupkg' -o \
            -name '*.zip' -o \
            -name '*.tar.gz' -o \
            -name '*.msi' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.sha256' \
          \))

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          gh release upload "$tag" "${files[@]}" --clobber
