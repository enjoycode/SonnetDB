name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 18 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build
        run: dotnet build TSLite.slnx --configuration Release

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
